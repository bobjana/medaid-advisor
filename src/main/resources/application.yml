spring:
  application:
    name: medaid-advisor

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/medaid_poc
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Disable data.sql initialization (we use ingestion pipeline instead)
  sql:
    init:
      mode: never
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Spring AI Configuration - OpenAI (pointing to Ollama endpoint)
  ai:
    openai:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}/v1
      api-key: ${OPENAI_API_KEY:sk-dummy}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.7
      embedding:
        enabled: false  # Disable OpenAI embedding, use Ollama instead
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.7
      embedding:
        enabled: true
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        dimension: 768  # nomic-embed-text dimension
        index-type: ivfflat
        distance-type: COSINE_DISTANCE
        initialize-schema: true

  # File upload configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# Logging
logging:
  level:
    cc.zynafin.medaid: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

#KZ|# Custom configuration
medaid:
  documents:
    source-path: ${MEDAID_DOCS_PATH:~/Documents/medaids}
    chunk-size: 800
    chunk-overlap: 100
  scoring:
    weights:
      cost: 0.30
      coverage: 0.40
      convenience: 0.15
      risk: 0.15
99|  extraction:
100|YQ|    agentic-enabled: false
101|HM|    confidence-threshold-local: 0.75
102|MH|    confidence-threshold-review: 0.6
103|RN|    remote-llm:
104|JX|      base-url: ${REMOTE_LLM_BASE_URL:}
105|TJ|      model: ${REMOTE_LLM_MODEL:}
106|YB|      api-key: ${REMOTE_LLM_API_KEY:}
