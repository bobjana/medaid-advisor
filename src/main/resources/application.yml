spring:
  application:
    name: medaid-advisor

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/medaid_poc
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Disable data.sql initialization (we use ingestion pipeline instead)
  sql:
    init:
      mode: never

  # Spring AI Configuration - OpenAI (pointing to Ollama endpoint)
  ai:
    openai:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      api-key: ${OPENAI_API_KEY:sk-dummy}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.7
      embedding:
        enabled: false  # Disable OpenAI embedding, use Ollama instead
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.7
      embedding:
        enabled: true
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        dimension: 768  # nomic-embed-text dimension
        index-type: ivfflat
        distance-type: COSINE_DISTANCE
        initialize-schema: true

  # File upload configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# Logging
logging:
  level:
    cc.zynafin.medaid: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Custom configuration
medaid:
  documents:
    source-path: ${MEDAID_DOCS_PATH:~/Documents/medaids}
    chunk-size: 800
    chunk-overlap: 100
  scoring:
    weights:
      cost: 0.30
      coverage: 0.40
      convenience: 0.15
      risk: 0.15
  extraction:
    agentic-enabled: true
    similarity-threshold: 0.0
    confidence-threshold-local: 0.75
    confidence-threshold-review: 0.6
    local-threshold: 0.75
    local:
      enabled: ${LOCAL_LLM_ENABLED:true}
      json-mode: ${LOCAL_LLM_JSON_MODE:true}
    remote:
      enabled: ${REMOTE_LLM_ENABLED:false}
      url: ${REMOTE_LLM_URL:https://openrouter.ai/api/v1}
      model: ${REMOTE_LLM_MODEL:google/gemma-3-4b-it:free}
      api-key: ${REMOTE_LLM_API_KEY:}
      
# Override defaults via environment:
# LOCAL_LLM_ENABLED=false
# REMOTE_LLM_ENABLED=true
# REMOTE_LLM_MODEL=google/gemma-3-4b-it:free
# REMOTE_LLM_URL=https://openrouter.ai/api/v1
