spring:
  application:
    name: medaid-advisor

  # Test database - use H2 for faster tests
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable AI services for tests (unless specifically testing RAG)
  ai:
    openai:
      enabled: false

  # Disable LLM in tests
  main:
    allow-bean-definition-overriding: true

server:
  port: 8081

logging:
  level:
    cc.zynafin.medaid: DEBUG
    org.springframework.test: DEBUG
